name: static-analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-and-security:
    name: "Execute Linting, Static Analysis & Dependency Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Initialize Repository Checkout"
        uses: actions/checkout@v4

      - name: "Configure Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Install Security and Linting Dependencies"
        shell: bash
        run: python -m pip install --upgrade pip ruff bandit pip-audit
        
      - name: "Execute Code Linting (Ruff)"
        shell: bash
        run: ruff check .
        
      - name: "Execute Dependency Vulnerability Scan (Safety CLI)"
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}

      - name: "Execute Static Application Security Testing (Bandit)"
        shell: bash
        run: bandit -r . -ll
