name: pip audit

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit

    - name: Run pip-audit and fix vulnerabilities
      run: |
        if [ -f requirements.txt ]; then
          pip-audit -r requirements.txt --fix || echo "pip-audit found issues it may or may not have fixed."
        else
          echo "requirements.txt not found, skipping audit."
        fi

    - name: Check for changes
      id: git-check
      run: |
        if [ -f requirements.txt ]; then
          git diff --exit-code requirements.txt && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit and Push fixes
      if: steps.git-check.outputs.changed == 'true'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add requirements.txt
        git commit -m "security: automated pip-audit fix for vulnerabilities"
        git push
