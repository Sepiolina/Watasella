name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------
  # JOB 1: Static analysis & dependency security gate
  # -------------------------------------------------------------
  lint-and-security:
    name: Lint, static analysis & dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install analysis tooling
        shell: bash
        run: python -m pip install --upgrade pip ruff bandit pip-audit
        
      - name: Lint (ruff)
        shell: bash
        run: ruff check .
        
      - name: Run Safety CLI
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}

      - name: Static security analysis (bandit)
        shell: bash
        run: bandit -r . -ll   
        
  # -------------------------------------------------------------
  # JOB 2: Unit tests + desktop smoke tests (Linux & Windows)
  # -------------------------------------------------------------
  desktop-tests:
    name: Test on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    needs: lint-and-security
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Linux system dependencies (GTK/WebKit + headless display)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.1 xvfb

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt cython setuptools

      - name: Compile core security module (Cython)
        shell: bash
        run: |
          # Finds the file natively and compiles it in-place (.so on Linux, .pyd on Windows)
          ENCRYPTION_FILE=$(find . -path "*/prospero/ariel/encryption.py" | head -n 1)
          if [ -n "$ENCRYPTION_FILE" ]; then
            echo "Compiling $ENCRYPTION_FILE with Cython..."
            cythonize -3 -i "$ENCRYPTION_FILE"
            echo "Removing source file to enforce binary loading during tests..."
            rm -f "$ENCRYPTION_FILE"
          else
            echo "Warning: encryption.py not found."
          fi

      - name: Run test suite (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: pytest -v --junitxml=test-results.xml

      - name: Run test suite (Linux, virtual framebuffer)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          xvfb-run --server-args="-screen 0 1280x1024x24" \
            pytest -v --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 7

  # -------------------------------------------------------------
  # JOB 3: Native Arm64 smoke test
  # -------------------------------------------------------------
  arm64-smoke-test:
    name: Smoke test on native Arm64
    needs: lint-and-security
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            python3 python3-pip python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 xvfb

      - name: Verify GTK/WebKit stack loads and can construct a window
        shell: bash
        run: |
          xvfb-run --server-args="-screen 0 1280x1024x24" python3 -c "
          import gi
          gi.require_version('Gtk', '3.0')
          gi.require_version('WebKit2', '4.1')
          from gi.repository import Gtk, WebKit2
          win = Gtk.Window()
          view = WebKit2.WebView()
          win.add(view)
          win.show_all()
          print('GTK/WebKit2 smoke test passed on Arm64.')
          "
